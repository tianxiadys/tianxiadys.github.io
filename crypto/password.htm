<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=500"/>
    <title>generate password</title>
    <style>
        textarea {
            height: 200px;
            width: 480px;
        }
    </style>
</head>
<body>
<h2>密码生成工具</h2>
<p>密码在您的浏览器中生成，不会上传到服务器，请放心使用</p>
<p>
    <label>
        <input checked id="id_include_1" type="checkbox"/>
        包含数字
    </label>
    <label>
        <input checked id="id_include_2" type="checkbox"/>
        包含大写字母
    </label>
    <label>
        <input checked id="id_include_3" type="checkbox"/>
        包含小写字母
    </label>
    <label>
        <input id="id_include_4" type="checkbox"/>
        包含数字区符号
    </label>
    <label>
        <input id="id_include_5" type="checkbox"/>
        包含字母区符号
    </label>
</p>
<p>
    <button id="id_button_gen16">生成16位密码</button>
    <button id="id_button_gen24">生成24位密码</button>
    <button id="id_button_gen32">生成32位密码</button>
</p>
<label for="id_textarea_password">
</label>
<textarea id="id_textarea_password" readonly="readonly">
</textarea>
<script>
    onload = () => {
        const buttonGen16 = document.getElementById('id_button_gen16')
        const buttonGen24 = document.getElementById('id_button_gen24')
        const buttonGen32 = document.getElementById('id_button_gen32')
        const checkInclude1 = document.getElementById('id_include_1')
        const checkInclude2 = document.getElementById('id_include_2')
        const checkInclude3 = document.getElementById('id_include_3')
        const checkInclude4 = document.getElementById('id_include_4')
        const checkInclude5 = document.getElementById('id_include_5')
        const textPassword = document.getElementById('id_textarea_password')

        function randomBytes(length) {
            const bytes = new Uint8Array(length)
            return crypto.getRandomValues(bytes)
        }

        function randomTable(length, table) {
            const bytes = randomBytes(length)
            const result = []
            for (const byte of bytes) {
                result.push(table[byte % table.length])
            }
            return result.join('')
        }

        function randomClick(length) {
            const range = []
            if (checkInclude1.checked) {
                range.push('0123456789')
            }
            if (checkInclude2.checked) {
                range.push('ABCDEFGHIJKLMNOPQRSTUVWXYZ')
            }
            if (checkInclude3.checked) {
                range.push('abcdefghijklmnopqrstuvwxyz')
            }
            if (checkInclude4.checked) {
                range.push('!@#$%^&*()')
            }
            if (checkInclude5.checked) {
                range.push('-=_+[]{};:,./<>?')
            }
            const table = range.join('')
            if (table) {
                textPassword.value = randomTable(length, table)
            } else {
                textPassword.value = ''
            }
        }

        buttonGen16.onclick = () => randomClick(16)
        buttonGen24.onclick = () => randomClick(24)
        buttonGen32.onclick = () => randomClick(32)
    }
</script>
</body>
</html>
