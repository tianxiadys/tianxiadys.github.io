<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=500"/>
    <title>base64 encoder</title>
    <style>
        textarea {
            height: 200px;
            width: 480px;
        }
    </style>
</head>
<body>
<h2>Base64编码工具</h2>
<label for="id_textarea_input">
</label>
<textarea id="id_textarea_input">
</textarea>
<p>
    <button id="id_button_encode">Base64编码↓</button>
    <button id="id_button_decode">Base64解码↑</button>
</p>
<label for="id_textarea_output">
</label>
<textarea id="id_textarea_output">
</textarea>
<script>
    onload = () => {
        const buttonDecoder = document.getElementById('id_button_decode')
        const buttonEncoder = document.getElementById('id_button_encode')
        const textInput = document.getElementById('id_textarea_input')
        const textOutput = document.getElementById('id_textarea_output')
        buttonEncoder.onclick = () => {
            textOutput.value = btoa(textInput.value)
        }
        buttonDecoder.onclick = () => {
            textInput.value = atob(textOutput.value)
        }
    }
</script>
</body>
</html>
